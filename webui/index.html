<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>四川大学SCU_URP自动化抢课</title>
  <style>
    :root{--bg:#0b1020;--panel:#121a2f;--panel2:#17213b;--text:#e8eefc;--muted:#98a7c8;--line:#263450;--brand:#65d3ff;--ok:#57d68d;--warn:#ffd166;--bad:#ff6b6b;--shadow:0 18px 50px rgba(0,0,0,.35)}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top left,#19315d 0,#0b1020 36%,#080b14 100%);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Arial,"Microsoft YaHei",sans-serif}
    header{display:flex;align-items:center;justify-content:space-between;padding:22px 28px;border-bottom:1px solid rgba(255,255,255,.08);backdrop-filter:blur(14px);position:sticky;top:0;z-index:10;background:rgba(11,16,32,.78)}
    h1{margin:0;font-size:22px;letter-spacing:.4px}.sub{color:var(--muted);font-size:13px;margin-top:4px}.pill{display:inline-flex;gap:8px;align-items:center;border:1px solid var(--line);border-radius:999px;padding:9px 12px;background:rgba(18,26,47,.75);color:var(--muted)}.dot{width:10px;height:10px;border-radius:50%;background:var(--muted);box-shadow:0 0 16px currentColor}.dot.on{background:var(--ok);color:var(--ok)}.dot.off{background:var(--bad);color:var(--bad)}
    main{display:grid;grid-template-columns:420px 1fr;gap:20px;padding:22px;max-width:1500px;margin:auto}.card{background:linear-gradient(180deg,rgba(23,33,59,.92),rgba(18,26,47,.94));border:1px solid rgba(255,255,255,.09);box-shadow:var(--shadow);border-radius:18px;overflow:hidden}.card h2{font-size:16px;margin:0;padding:16px 18px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center}.body{padding:16px 18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}.field.full{grid-column:1/-1}label{font-size:12px;color:var(--muted)}input,select,textarea{width:100%;border:1px solid var(--line);background:#0b1224;color:var(--text);border-radius:12px;padding:10px 12px;outline:none}textarea{min-height:60px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(101,211,255,.12)}.checks{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0 14px}.check{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px}.check input{width:auto}.btns{display:flex;gap:10px;flex-wrap:wrap}button{border:0;border-radius:12px;padding:11px 14px;font-weight:700;cursor:pointer;color:#06101f;background:var(--brand)}button.secondary{background:#253450;color:var(--text);border:1px solid var(--line)}button.danger{background:var(--bad);color:#fff}button.ok{background:var(--ok)}button:disabled{opacity:.5;cursor:not-allowed}.cmd{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;background:#070b14;border:1px solid var(--line);border-radius:12px;padding:10px;color:#b9c7e8;white-space:pre-wrap;word-break:break-all;margin-top:12px;font-size:12px}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:14px}.stat{background:rgba(11,18,36,.75);border:1px solid var(--line);border-radius:16px;padding:14px}.stat b{font-size:24px;display:block}.stat span{color:var(--muted);font-size:12px}.logbar{display:flex;gap:10px;align-items:center;margin-bottom:10px}.logbar select{max-width:520px}.terminal{height:650px;overflow:auto;background:#030712;border:1px solid #1b2842;border-radius:16px;padding:14px;font-family:ui-monospace,SFMono-Regular,Consolas,"Courier New",monospace;font-size:13px;line-height:1.55;white-space:pre-wrap;color:#d9e6ff}.line-ok{color:var(--ok)}.line-bad{color:var(--bad)}.line-warn{color:var(--warn)}.selected-popup{position:fixed;right:22px;top:92px;width:min(460px,calc(100vw - 44px));max-height:70vh;overflow:auto;background:linear-gradient(180deg,#123522,#0d1f18);border:1px solid rgba(87,214,141,.65);border-radius:18px;box-shadow:0 20px 70px rgba(0,0,0,.55);z-index:30;display:none}.selected-popup h3{margin:0;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.12);color:#dffff0;display:flex;justify-content:space-between;align-items:center}.selected-popup .close{background:rgba(255,255,255,.12);color:#fff;padding:6px 10px}.selected-item{margin:12px;padding:12px;border-radius:14px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.12)}.selected-item b{display:block;color:#57d68d;margin-bottom:6px}.selected-item pre{margin:0;white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;color:#d9ffe8}.toast{position:fixed;right:22px;bottom:22px;background:#10182c;border:1px solid var(--line);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow);display:none}.small{font-size:12px;color:var(--muted)}@media(max-width:1000px){main{grid-template-columns:1fr}.terminal{height:500px}.stats{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<header>
  <div><h1>四川大学SCU_URP自动化抢课</h1><div class="sub">填写学号 + 课程号/课程名 | 启动/停止任务 | 查看自己的实时日志</div></div>
  <div class="pill"><span id="dot" class="dot"></span><span id="statusText">检查中</span></div>
</header>
<main>
  <section class="card">
    <h2>运行配置 <span class="small" id="savedAt"></span></h2>
    <div class="body">
      <div class="grid">
        <div class="field"><label>学号</label><input id="urp_username" autocomplete="username" /></div>
        <div class="field"><label>教务密码 password</label><input id="urp_password" type="password" autocomplete="current-password" /></div>
        <div class="field"><label>模式</label><select id="mode"><option value="grab">grab 抢课</option><option value="list">list 查询课程</option></select></div>
        <div class="field"><label>匹配模式</label><select id="match_mode"><option value="course">按课程号（可选课序号）</option><option value="name">按课程名（可选教师）</option></select><input id="category" type="hidden" value="free" /></div>
        <div class="field full"><label>目标课程号（可选；可填 课程号 或 课程号_课序号；多个用英文逗号分隔）</label><input id="course_id" placeholder="例如 888006010A07 或 888006010A07_01" /></div>
        <div class="field"><label>课程名（可选；严格相同）</label><input id="name" placeholder="例如 大学英语" /></div>
        <div class="field"><label>教师名（可选；与课程名合用）</label><input id="teacher" placeholder="例如 张三" /></div>
        <div class="field"><label>查询条数 limit</label><input id="limit" type="number" min="0" /></div>
        <div class="field"><label>最大轮数 max_attempts（0 不限制）</label><input id="max_attempts" type="number" min="0" /></div>
        <div class="field"><label>基础间隔 interval 秒（推荐 2）</label><input id="interval" type="number" step="0.05" min="0" /></div>
        <div class="field"><label>随机抖动 jitter 秒（推荐 1.3）</label><input id="jitter" type="number" step="0.05" min="0" /></div>
        <div class="field"><label>确认次数 confirm_attempts</label><input id="confirm_attempts" type="number" min="0" /></div>
        <div class="field"><label>额外参数</label><input id="extra_args" placeholder="例如 --kkxsh XXX" /></div>
      </div>
      <div class="checks">
        <label class="check"><input id="quiet_login" type="checkbox" /> 静默登录</label>
        <label class="check"><input id="dry_run" type="checkbox" /> dry-run 不真实提交</label>
        <label class="check"><input id="once" type="checkbox" /> 只执行一次</label>
        <label class="check"><input id="no_confirm" type="checkbox" /> 不做最终确认</label>
        <label class="check"><input id="system_not_open" type="checkbox" /> 选课系统未开放</label>
      </div>
      <p class="small" id="systemNotOpenNote">“选课系统未开放”用于系统入口暂时进不去或不稳定时：不查询已选人数以降低延迟，若已有缓存目标则继续按目标提交。</p>
      <div class="btns">
        <button id="saveBtn" class="secondary">保存当前参数</button>
        <button id="startBtn" class="ok">启动</button>
        <button id="stopBtn" class="danger">停止</button>
        <button id="refreshBtn" class="secondary">刷新日志</button>
      </div>
      <div id="cmd" class="cmd"></div>
      <p class="small">提示：list 模式只显示查询相关选项；grab 模式才显示轮询/提交相关选项。日志出现 <code>final_status: selected</code> 才表示最终确认选上。</p>
    </div>
  </section>
  <section class="card">
    <h2>实时日志 <span class="small" id="runInfo"></span></h2>
    <div class="body">
      <div class="stats">
        <div class="stat"><b id="sAttempts">0</b><span>轮询/尝试</span></div>
        <div class="stat"><b id="sSubmit">0</b><span>提交</span></div>
        <div class="stat"><b id="sSelected">0</b><span>成功</span></div>
        <div class="stat"><b id="sFailed">0</b><span>失败</span></div>
        <div class="stat"><b id="sBad">0</b><span>502/503/504</span></div>
      </div>
      <div class="logbar">
        <select id="logSelect"></select>
        <button class="secondary" id="loadLogBtn">加载</button>
        <button class="secondary" id="clearViewBtn">清屏</button>
      </div>
      <div id="terminal" class="terminal"></div>
    </div>
  </section>
</main>
<div id="selectedPopup" class="selected-popup"><h3>已抢到课程 <button id="selectedClose" class="close">关闭</button></h3><div id="selectedList"></div></div>
<div id="toast" class="toast"></div>
<script>
const ids = ['urp_username','urp_password','mode','category','match_mode','course_id','name','teacher','limit','interval','jitter','max_attempts','confirm_attempts','quiet_login','dry_run','once','no_confirm','system_not_open','extra_args'];
const $ = id => document.getElementById(id);
let es = null, currentLog = localStorage.getItem('urpq_current_log') || '';
let runToken = localStorage.getItem('urpq_run_token') || '';
let currentRunKey = localStorage.getItem('urpq_current_run_key') || 'initial';
let statsByRun = {};
let shownSelectedKeys = new Set();
try{ statsByRun = JSON.parse(localStorage.getItem('urpq_stats_by_run') || '{}') || {}; }catch(e){ statsByRun = {}; }
function tokenQS(){ return runToken ? (runToken.includes('?') ? '' : 'run_token='+encodeURIComponent(runToken)) : ''; }
function withToken(url){ if(!runToken) return url; return url + (url.includes('?')?'&':'?') + 'run_token=' + encodeURIComponent(runToken); }
function toast(msg){ const t=$('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2600); }
function alertKey(a){ return (a.course||'未知课程')+'|'+String(a.message||'').slice(-300); }
function handleSelectedAlerts(alerts, force=false){ if(!alerts||!alerts.length) return; const fresh=alerts.filter(a=>force || !shownSelectedKeys.has(alertKey(a))); if(!fresh.length) return; fresh.forEach(a=>shownSelectedKeys.add(alertKey(a))); const list=$('selectedList'); list.innerHTML=''; fresh.forEach(a=>{ const div=document.createElement('div'); div.className='selected-item'; const b=document.createElement('b'); b.textContent=a.course||'未知课程'; const pre=document.createElement('pre'); pre.textContent=a.message||''; div.appendChild(b); div.appendChild(pre); list.appendChild(div); }); $('selectedPopup').style.display='block'; document.title='已抢到课程 - 四川大学SCU_URP自动化抢课'; try{ localStorage.setItem('urpq_selected_alerts', JSON.stringify(alerts)); }catch(e){} }
function restoreSelectedAlerts(){ try{ const a=JSON.parse(localStorage.getItem('urpq_selected_alerts')||'[]'); if(a.length) handleSelectedAlerts(a, true); }catch(e){} }
function getCfg(){ const c={}; ids.forEach(id=>{ const el=$(id); if(!el)return; c[id] = el.type==='checkbox' ? el.checked : el.value; }); c.category='free'; return c; }
function setCfg(c){ ids.forEach(id=>{ if(!(id in c)) return; const el=$(id); if(!el)return; if(el.type==='checkbox') el.checked=!!c[id]; else el.value=c[id] ?? ''; }); updateVisibleOptions(); renderCmd(); }
function renderCmd(){ const c=getCfg(); let a=['python','course_grabber.py']; if(c.urp_username)a.push('--username',c.urp_username); if(c.urp_password)a.push('--password','******'); if(c.quiet_login)a.push('--quiet-login'); a.push(c.mode,'--category','free'); const fields=c.match_mode==='name' ? [['name','--name'],['teacher','--teacher']] : [['course_id','--course-id']]; fields.forEach(([k,f])=>{if(c[k])a.push(f, c[k])}); if(c.mode==='list'){ if(c.limit>0)a.push('--limit',c.limit); } else if(c.mode==='grab'){ if(c.dry_run)a.push('--dry-run'); if(c.no_confirm)a.push('--no-confirm'); if(c.system_not_open)a.push('--system-not-open'); a.push('--interval',c.interval,'--jitter',c.jitter); if(c.max_attempts>0)a.push('--max-attempts',c.max_attempts); if(c.confirm_attempts>0)a.push('--confirm-attempts',c.confirm_attempts); if(c.once)a.push('--once'); } if(c.extra_args)a.push(c.extra_args); $('cmd').textContent=a.join(' '); }
function fieldBox(id){ const el=$(id); return el ? el.closest('.field') || el.closest('.check') : null; }
function setShown(id, show){ const box=fieldBox(id); if(box) box.style.display = show ? '' : 'none'; }
function updateVisibleOptions(){ const m=$('match_mode') ? $('match_mode').value : 'course'; const run=$('mode') ? $('mode').value : 'grab'; setShown('course_id', m==='course'); ['name','teacher'].forEach(id=>setShown(id, m==='name')); setShown('limit', run==='list'); ['interval','jitter','max_attempts','confirm_attempts','dry_run','once','no_confirm','system_not_open'].forEach(id=>setShown(id, run==='grab')); const note=$('systemNotOpenNote'); if(note) note.style.display = run==='grab' ? '' : 'none'; }
ids.forEach(id=>{const el=$(id); if(el) el.addEventListener('input',()=>{updateVisibleOptions(); renderCmd();});});
async function api(url,opt){ const r=await fetch(url,{headers:{'Content-Type':'application/json'},...opt}); const j=await r.json(); if(!r.ok) throw new Error(j.error||r.statusText); return j; }
async function loadConfig(){ setCfg(await api('/api/config')); }
async function saveConfig(){ const j=await api('/api/config',{method:'POST',body:JSON.stringify(getCfg())}); setCfg(j.config); $('savedAt').textContent='已保存 '+new Date().toLocaleTimeString(); toast('配置已保存'); }
async function start(){ const cfg=getCfg(); if(cfg.match_mode==='course'){ if(!String(cfg.course_id||'').trim()){ toast('请填写目标课程号'); return; } cfg.name=''; cfg.teacher=''; } else { if(!String(cfg.name||'').trim()){ toast('请填写课程名'); return; } cfg.course_id=''; } ['kch','kxh','search'].forEach(k=>cfg[k]=''); shownSelectedKeys.clear(); try{localStorage.removeItem('urpq_selected_alerts');}catch(e){} const j=await api('/api/start',{method:'POST',body:JSON.stringify(cfg)}); if(j.run_token){ runToken=j.run_token; localStorage.setItem('urpq_run_token', runToken); } currentRunKey=runKeyFromRun(j.run); if(!statsByRun[currentRunKey]) statsByRun[currentRunKey]={attempts:0,submit:0,selected:0,failed:0,bad_gateway:0}; persistStats(); renderAccumStats(); toast('已启动 PID '+j.run.pid); await refreshLogs(); connectStream(); await status(true); }
async function stop(){ const j=await api(withToken('/api/stop'),{method:'POST',body:'{}'}); toast(j.message||'已停止'); await status(true); }
function appendLog(text){ if(!text) return; const term=$('terminal'); const atBottom = term.scrollTop + term.clientHeight >= term.scrollHeight - 30; const span=document.createElement('span'); span.textContent=text; term.appendChild(span); if(atBottom) term.scrollTop=term.scrollHeight; }
function connectStream(file=''){ if(es) es.close(); let url='/api/stream'+(file?'?file='+encodeURIComponent(file):''); url=withToken(url); es=new EventSource(url); es.onmessage=e=>{ const d=JSON.parse(e.data); if(d.file) currentLog=d.file; appendLog(d.text); if(d.text) status(true); else status(false); }; es.onerror=()=>{}; }
function runKeyFromRun(run){ return run ? `${run.started_at||''}|${run.pid||''}|${run.student_id||''}` : (currentRunKey || 'initial'); }
function persistStats(){ try{ localStorage.setItem('urpq_stats_by_run', JSON.stringify(statsByRun)); localStorage.setItem('urpq_current_run_key', currentRunKey); }catch(e){} }
function renderAccumStats(){ const total={attempts:0,submit:0,selected:0,failed:0,bad_gateway:0}; Object.values(statsByRun).forEach(s=>{ if(!s)return; total.attempts+=Number(s.attempts||0); total.submit+=Number(s.submit||0); total.selected+=Number(s.selected||0); total.failed+=Number(s.failed||0); total.bad_gateway+=Number(s.bad_gateway||0); }); $('sAttempts').textContent=total.attempts; $('sSubmit').textContent=total.submit; $('sSelected').textContent=total.selected; $('sFailed').textContent=total.failed; $('sBad').textContent=total.bad_gateway; }
function updateStats(s,key=currentRunKey){ if(!s)return; key=key||currentRunKey||'initial'; statsByRun[key]={attempts:Number(s.attempts||0),submit:Number(s.submit||0),selected:Number(s.selected||0),failed:Number(s.failed||0),bad_gateway:Number(s.bad_gateway||0)}; persistStats(); renderAccumStats(); }
async function status(updateStatsFromStatus=false){ const j=await api(withToken('/api/status')); $('dot').className='dot '+(j.running?'on':'off'); $('statusText').textContent=j.running?'运行中':'未运行'; $('startBtn').disabled=j.running; $('stopBtn').disabled=!j.running; if(j.run){ currentRunKey=runKeyFromRun(j.run); persistStats(); $('runInfo').textContent=`学号 ${j.run.student_id||'-'} | PID ${j.run.pid||'-'} | ${j.run.started_at||''}`; currentLog=j.run.stdout || currentLog; if(currentLog) localStorage.setItem('urpq_current_log', currentLog); } handleSelectedAlerts(j.selected_alerts); if(updateStatsFromStatus) updateStats(j.stats,currentRunKey); else renderAccumStats(); }
async function refreshLogs(){ const j=await api(withToken('/api/logs')); const sel=$('logSelect'); sel.innerHTML=''; const all=[...(j.runs||[]).map(r=>r.stdout), ...(j.files||[])].filter(Boolean); [...new Set(all)].forEach(f=>{const o=document.createElement('option'); o.value=f; o.textContent=f; sel.appendChild(o);}); const saved=localStorage.getItem('urpq_current_log'); if(saved && [...sel.options].some(o=>o.value===saved)) sel.value=saved; else if(currentLog && [...sel.options].some(o=>o.value===currentLog)) sel.value=currentLog; }
async function loadTail(){ const f=$('logSelect').value || currentLog; if(f) localStorage.setItem('urpq_current_log', f); const j=await api(withToken('/api/tail?lines=500&file='+encodeURIComponent(f))); $('terminal').textContent=j.text||''; handleSelectedAlerts(j.selected_alerts); updateStats(j.stats,currentRunKey); connectStream(f); }
$('selectedClose').onclick=()=>{ $('selectedPopup').style.display='none'; document.title='四川大学SCU_URP自动化抢课'; };
$('saveBtn').onclick=()=>saveConfig().catch(e=>toast(e.message)); $('startBtn').onclick=()=>start().catch(e=>toast(e.message)); $('stopBtn').onclick=()=>stop().catch(e=>toast(e.message)); $('refreshBtn').onclick=()=>{refreshLogs();status(false);}; $('loadLogBtn').onclick=()=>loadTail().catch(e=>toast(e.message)); $('clearViewBtn').onclick=()=>{$('terminal').textContent=''};
(async()=>{ renderAccumStats(); restoreSelectedAlerts(); await loadConfig(); await refreshLogs(); await status(true); connectStream(); setInterval(()=>status(false),3000); })().catch(e=>toast(e.message));
</script>
</body>
</html>
